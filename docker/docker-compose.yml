services:
  ransomemu:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ransomemu
    env_file: ../.env
    volumes:
      - ../reports:/opt/ransomemu/reports
      - ../config:/opt/ransomemu/config
    networks:
      - ransomemu-net
    depends_on:
      ollama:
        condition: service_healthy
    stdin_open: true
    tty: true

  ollama:
    image: ollama/ollama:latest
    container_name: ransomemu-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - ransomemu-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:11434/" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

networks:
  ransomemu-net:
    driver: bridge

volumes:
  ollama-data:
